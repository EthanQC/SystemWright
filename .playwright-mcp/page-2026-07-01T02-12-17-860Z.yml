      - heading "「置身 X 内」大厂文化长文 · 逐篇分析与综合解读" [level=1] [ref=e29]
      - paragraph [ref=e30]: 2026 年互联网大厂涌现的一组仿写《置身事内》标题的内网/离职长文。本页把它们 逐篇按统一分析框架拆解，再横向综合，用可读性强的分目录方式呈现。
      - generic [ref=e31]:
        - text: 统一分析框架（每篇一致）：作者与身份 · 公司 · 篇幅 · 核心论点 · 关键证据 · 组织病理类型 · 代表性金句 · 影响/后续 · 局限与偏见。
        - text: 本版状态：这是 SystemWright 的试运行产物——《置身钉内》《置身团内》为 真实抓取后分析（实测）；其余为 目录占位，待循环补齐。见页脚真实性说明。
    - generic [ref=e32]:
      - heading "总览 · 这是什么" [level=2] [ref=e33]
      - article [ref=e34]:
        - paragraph [ref=e35]: 「置身 X 内」是对经济学家兰小欢 2021 年著作《置身事内》标题的集体仿写。2026 年 6 月起， 钉钉一位 AI 旗舰项目前产品经理发出约 7.5 万字离职长文《置身钉内》引爆全网后， 美团、小米、字节等公司陆续出现同题材的内网/离职文，形成一个可辨识的文体类型： 大厂在职/前员工从内部视角，复盘组织如何在效率、管控、AI 化的名义下消耗个体。
        - paragraph [ref=e36]: 因为这是一个还在生长的文体（新的「置身某内」会持续出现），本页不是一次性文章， 而是一条可重复运行的流水线：收集 → 逐篇分析 → 综合 → 生成本页。新文章出现时， 重跑一次即可增量更新。
