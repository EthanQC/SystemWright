      - generic [ref=e79]:
        - generic [ref=e80]: 核心论点
        - text: 管理走向异化与去人性化：以「管控」为名，把对个体的消耗推到底线之外。
      - generic [ref=e81]:
        - generic [ref=e82]: 关键证据
        - list [ref=e83]:
          - listitem [ref=e84]: 自动已读：取消了员工的缓冲空间，消息一到即视为已读。
          - listitem [ref=e85]: 层级加权算法：高管消息长期置顶，基层声音被系统性压制。
          - listitem [ref=e86]: 「望舒行动」：要求员工监测竞对工时并对齐。
          - listitem [ref=e87]: 「金色飞贼」：领导巡查，发现刷社媒者需公开写检讨。
          - listitem [ref=e88]: PPT 文化：汇报观感盖过真实产品结果。
      - generic [ref=e89]:
        - generic [ref=e90]: 组织病理类型
        - text: 福柯式「全景监狱」：核心不是「有人正在看你」，而是「你根本不知道是否正在被看」。
      - blockquote [ref=e91]: 「最折磨人的不是『有人正在看你』，而是你根本不知道你是否正在被看。」
      - generic [ref=e92]:
        - generic [ref=e93]: 影响 / 后续
        - text: 发文后不到七天，阿里合伙人委员会亲自下场批评，次日相关一把手（陈航/无招）火线卸任。
      - generic [ref=e94]:
        - generic [ref=e95]: 局限与偏见
        - text: 单一离职者视角、情绪浓度高、以单个项目（ONE）经验外推整个组织；缺少管理层对话与反证。
