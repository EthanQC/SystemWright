      - blockquote [ref=e116]: 「不像一家十几年数据积累的科技公司，更像靠人肉、经验和临时协调的手工作坊。」
      - generic [ref=e117]:
        - generic [ref=e118]: 局限与偏见
        - text: 在职时间短、篇幅小、证据密度低于《置身钉内》；旁观者/短工视角，缺乏纵深复盘。
